<!DOCTYPE html>

<html>

<body style="

background-image:
url('space.jpg');

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

color:white;

padding:80px 40px;

font-family:Arial;

min-height:100vh;

margin:0;

">

<div style="

background:
rgba(0,0,0,0.55);

padding:40px;

border-radius:20px;

max-width:900px;

margin:auto;

text-align:center;

">

<h1 style="

font-size:60px;

margin-bottom:20px;

">

OUR UNIVERSE

</h1>

<h2 style="

font-size:35px;

margin-bottom:30px;

">

THE SG UNIVERSE

</h2>

<button onclick="startJourney()">

✨ Start Journey

</button>

<audio id="bgmusic" loop>

<source src="cornfield.mp3" type="audio/mpeg">

</audio>

<script>

const music =
document.getElementById(
'bgmusic'
);

/* restore saved time */

const savedTime =
localStorage.getItem(
'musicTime'
);

if(savedTime){

music.currentTime =
parseFloat(savedTime);

}

/* restore play state */

const shouldPlay =
localStorage.getItem(
'musicPlaying'
);

if(shouldPlay==="true"){

music.play().catch(()=>{});

}

/* save music position */

setInterval(()=>{

localStorage.setItem(

'musicTime',

music.currentTime

);

},500);

/* start journey */

function startJourney(){

music.play()

.then(()=>{

localStorage.setItem(

'musicPlaying',

'true'

);

window.location.href=
'stage01.html';

})

.catch(error=>{

console.log(error);

});

}

</script>

</div>

</body>

</html>
