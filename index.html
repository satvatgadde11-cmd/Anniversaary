<!DOCTYPE html>

<html>

<body style="

background-image:
url('space.jpg');

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

color:white;

padding:80px 40px;

font-family:Arial;

min-height:100vh;

margin:0;

">
<div style="

background:
rgba(0,0,0,0.55);

padding:40px;

border-radius:20px;

max-width:900px;

margin:auto;

">

<h1 style="

font-size:60px;

margin-bottom:20px;

">

OUR UNIVERSE

</h1>

<h2 style="

font-size:35px;

margin-bottom:30px;

">

THE SG UNIVERSE

</h2>

<a href="stage01.html">

<button onclick="startMusic()">

Start Journey ✨

</button>

</a>

<audio id="bgmusic" loop>

<source src="cornfield.mp3" type="audio/mpeg">

</audio>

<script>

const music =
document.getElementById(
'bgmusic'
);

const savedTime =
localStorage.getItem(
'musicTime'
);

if(savedTime){

music.currentTime =
savedTime;

}

function startMusic(){

music.play();

}

document.body.addEventListener(

'click',

startMusic,

{once:true}

);

setInterval(()=>{

localStorage.setItem(

'musicTime',

music.currentTime

);

},1000);

window.addEventListener(

'beforeunload',

()=>{

localStorage.setItem(

'musicTime',

music.currentTime

);

}

);

</script> 

</body>

</html>
